# Robô do link público: coloca o build mais novo da Special Clinic no grupo
# "Dentistas" do TestFlight com link público e envia para a análise beta da Apple.
# O link que sai no log é o que você manda para os dentistas instalarem.
name: Link público de teste (Clinic)

on:
  workflow_dispatch:
  push:
    branches: [claude/special-lab-test-mode-9jrxb1]
    paths: ['publicar-teste.mjs', '.github/workflows/publicar-teste.yml']

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Publica o link de teste
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          TELEFONE_CONTATO: ${{ secrets.TELEFONE_CONTATO }}
        run: node publicar-teste.mjs
