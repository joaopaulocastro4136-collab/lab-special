# Fábrica dos sites: publica as páginas já prontas (dist-web e dist-clinic)
# no Firebase Hosting — inclui a página de suporte exigida pela Apple
# (https://laboratorio-special.web.app/suporte.html).
# Rodar manualmente: aba Actions → "Sites → Firebase Hosting" → Run workflow.
name: Sites → Firebase Hosting

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['dist-web/**', 'dist-clinic/**', 'dist-home/**', '.github/workflows/hosting.yml']

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepara a credencial do Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::Falta o segredo FIREBASE_SERVICE_ACCOUNT no GitHub (Settings → Secrets → Actions)."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Preserva o APK que já está no ar (o deploy apaga o que não estiver na pasta)
        run: |
          if curl -sfL -o dist-web/LabSpecial.apk https://laboratorio-special.web.app/LabSpecial.apk; then
            echo "APK atual preservado ($(du -h dist-web/LabSpecial.apk | cut -f1))"
          else
            echo "aviso: APK não está no ar — siga sem ele (rode a fábrica 'APK Android → Site' para publicar)"
            rm -f dist-web/LabSpecial.apk
          fi

      - name: Garante o site curto (labspecial.web.app)
        run: npx firebase-tools hosting:sites:create labspecial --project laboratorio-special --non-interactive 2>&1 | grep -v "^$" || echo "site já existe (ou nome ocupado — veja acima)"

      - name: Publica os sites (lab, clinic e página de apresentação)
        run: |
          npx firebase-tools deploy --only hosting:lab,hosting:clinic --project laboratorio-special --non-interactive --force
          npx firebase-tools deploy --only hosting:home --project laboratorio-special --non-interactive --force || echo "::warning::não consegui publicar a página de apresentação (nome labspecial pode estar ocupado)"

      - name: Avisa os buscadores (IndexNow — Bing/DuckDuckGo e parceiros)
        run: |
          curl -s "https://api.indexnow.org/indexnow?url=https://labspecial.web.app/&key=ac1680c465d52320f674ca854521ffff" || true
          curl -s "https://www.bing.com/indexnow?url=https://labspecial.web.app/&key=ac1680c465d52320f674ca854521ffff" || true
          echo "buscadores avisados ✓"
