# Robô-diagnóstico do carteiro de notificações: mostra os aparelhos registrados,
# os pedidos de aprovação pendentes e os logs recentes das funções de push.
name: Diagnóstico do push

on:
  workflow_dispatch:
  push:
    branches: [claude/special-lab-test-mode-9jrxb1]
    paths: ['diagnosticar-push.mjs', '.github/workflows/diagnosticar-push.yml']

jobs:
  diagnosticar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Prepara a credencial
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"
      - name: Roda o diagnóstico
        run: node diagnosticar-push.mjs
