# Libera um dentista no Special Clinic pelo e-mail (ex.: o e-mail do ID Apple).
# Rodar manualmente: aba Actions → "Liberar dentista" → Run workflow.
name: Liberar dentista

on:
  workflow_dispatch:
    inputs:
      email:
        description: "E-mail do dentista a liberar"
        required: true
      nome:
        description: "Nome do dentista (opcional: liga a um dentista já cadastrado com esse nome)"
        required: false
        default: ""
      lab:
        description: "Laboratório"
        required: false
        default: "principal"

jobs:
  liberar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Prepara a credencial
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"
      - name: Libera o dentista
        env:
          DENTISTA_EMAIL: ${{ github.event.inputs.email }}
          DENTISTA_NOME: ${{ github.event.inputs.nome }}
          LAB_ID: ${{ github.event.inputs.lab }}
        run: node liberar-dentista.mjs
