# Fábrica das Cloud Functions: publica o "cérebro" do servidor (push + IA Special).
# Precisa de 2 segredos no GitHub (Settings → Secrets and variables → Actions):
#   FIREBASE_SERVICE_ACCOUNT — o conteúdo do .json de conta de serviço do Firebase
#     (Console do Firebase → Configurações do projeto → Contas de serviço → Gerar nova chave privada)
#   GEMINI_API_KEY — a chave da IA criada em aistudio.google.com/apikey (opcional:
#     se estiver vazia, o robô mantém a que já estiver gravada no projeto)
# Rodar manualmente: aba Actions → "Funções → Firebase" → Run workflow.
name: Funções → Firebase

on:
  workflow_dispatch:
  push:
    branches: [claude/special-lab-test-mode-9jrxb1]
    paths: ['functions/**', '.github/workflows/functions.yml']

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepara a credencial do Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::Falta o segredo FIREBASE_SERVICE_ACCOUNT no GitHub (Settings → Secrets → Actions)."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Instala dependências das funções
        run: cd functions && npm ci

      - name: Entrega a chave da IA (Gemini) para as funções
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::Falta o segredo GEMINI_API_KEY no GitHub (Settings → Secrets → Actions)."
            exit 1
          fi
          # A chave do Gemini é UMA linha começando com AIza — barra colagens erradas (ex.: o .json do Firebase)
          if ! printf '%s' "$GEMINI_API_KEY" | tr -d '\r' | grep -qE '^AIza[0-9A-Za-z_-]{10,}$'; then
            echo "::error::O segredo GEMINI_API_KEY não parece uma chave do Gemini (deve ser UMA linha começando com AIza...). Atualize o segredo no GitHub colando a chave criada em aistudio.google.com/apikey."
            exit 1
          fi
          printf 'GEMINI_API_KEY=%s\n' "$GEMINI_API_KEY" | tr -d '\r' > functions/.env
          echo "Chave entregue via functions/.env (não vai para o git) ✓"

      - name: Publica as funções
        run: npx firebase-tools deploy --only functions --project laboratorio-special --non-interactive --force
